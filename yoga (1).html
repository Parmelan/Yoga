<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }
  .app { max-width: 480px; margin: 0 auto; }

  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 600; color: #1a1a18; }
  .header p { font-size: 13px; color: #888; margin-top: 3px; }

  .section-label {
    font-size: 11px; font-weight: 600; color: #aaa;
    text-transform: uppercase; letter-spacing: 0.07em;
    margin-bottom: 8px;
  }

  .cats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
  .cat-btn {
    font-size: 13px; padding: 6px 13px;
    border-radius: 20px; border: 1px solid #d8d6d0;
    background: #fff; color: #555;
    cursor: pointer; transition: all 0.12s;
    white-space: nowrap; font-family: inherit;
  }
  .cat-btn:hover { border-color: #b0aaa0; background: #faf9f6; }
  .cat-btn.active {
    background: #e8f0fe; border-color: #a8bffd;
    color: #2952c4; font-weight: 600;
  }

  .duration-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 1.5rem;
  }
  .duration-row label { font-size: 13px; color: #666; white-space: nowrap; }
  .duration-row input[type=range] {
    flex: 1; height: 4px; cursor: pointer;
    accent-color: #2952c4;
  }
  .duration-row .val {
    font-size: 13px; font-weight: 600; color: #1a1a18;
    min-width: 65px; text-align: right;
  }

  .results-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }
  .count { font-size: 13px; color: #999; }
  .reset-btn {
    font-size: 12px; padding: 4px 10px;
    border-radius: 6px; border: 1px solid #d8d6d0;
    background: transparent; color: #666;
    cursor: pointer; font-family: inherit;
  }
  .reset-btn:hover { background: #eee; }

  .video-list { display: flex; flex-direction: column; gap: 8px; }

  .video-card {
    background: #fff; border: 1px solid #e0ddd8;
    border-radius: 12px; padding: 10px 12px 10px 10px;
    display: flex; align-items: center; gap: 12px;
    text-decoration: none; color: inherit;
    transition: border-color 0.12s, background 0.12s;
  }
  .video-card:hover {
    border-color: #a8bffd; background: #f0f4ff;
  }
  .video-card:active { transform: scale(0.99); }

  .video-thumb {
    width: 120px; height: 68px; border-radius: 8px;
    object-fit: cover; flex-shrink: 0;
    background: #e8f0fe;
  }

  .video-info { flex: 1; min-width: 0; }
  .video-title {
    font-size: 13px; font-weight: 400; color: #1a1a18;
    line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .video-meta { font-size: 11px; color: #aaa; margin-top: 4px; }

  .arrow-icon { width: 14px; height: 14px; stroke: #bbb; flex-shrink: 0; }

  .empty {
    text-align: center; padding: 2.5rem 1rem;
    color: #aaa; font-size: 14px;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #141412; color: #e8e6e0; }
    .header h1 { color: #e8e6e0; }
    .cat-btn { background: #222; border-color: #333; color: #aaa; }
    .cat-btn:hover { background: #2a2a28; border-color: #444; }
    .cat-btn.active { background: #1a2a4a; border-color: #2952c4; color: #7aabff; }
    .video-card { background: #1e1c1a; border-color: #2e2c28; color: #e8e6e0; }
    .video-card:hover { background: #1a2030; border-color: #2952c4; }
    .video-thumb { background: #1a2a4a; }
    .video-title { color: #e8e6e0; }
    .reset-btn { background: transparent; border-color: #333; color: #888; }
    .reset-btn:hover { background: #2a2a28; }
    .arrow-icon { stroke: #444; }
  }
</style>
</head>

let activeCat = null;
let maxDur = 30;

function formatDur(v) { return v >= 30 ? "toutes" : "≤ " + v + " min"; }

function render() {
  const seen = new Set();
  const filtered = VIDEOS.filter(v => {
    if (seen.has(v.u)) return false;
    seen.add(v.u);
    if (activeCat !== null && !v.c.includes(activeCat)) return false;
    if (maxDur < 30 && v.d > maxDur) return false;
    return true;
  });

  document.getElementById('count').textContent =
    filtered.length + ' vidéo' + (filtered.length !== 1 ? 's' : '');

  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">Aucune vidéo pour ces filtres.</div>';
    return;
  }

  list.innerHTML = filtered.map(v => {
    const videoId = (v.u.match(/[?&]v=([^&]+)/) || [])[1] || '';
    const thumb = videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : '';
    return `
    <a class="video-card" href="${v.u}" target="_blank">
      <img class="video-thumb" src="${thumb}" alt="" loading="lazy">
      <div class="video-info">
        <div class="video-title">${v.t}</div>
        <div class="video-meta">${Math.round(v.d)} min · ${v.c.map(id => CAT_NAMES[id]).join(' · ')}</div>
      </div>
      <svg class="arrow-icon" viewBox="0 0 16 16" fill="none" stroke-width="1.5">
        <path d="M3 8h10M9 4l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  `}).join('');
}

function buildCats() {
  const container = document.getElementById('cats');
  const all = document.createElement('button');
  all.className = 'cat-btn active';
  all.textContent = 'Toutes';
  all.onclick = () => { activeCat = null; updateCats(); render(); };
  container.appendChild(all);

  Object.entries(CAT_NAMES).forEach(([id, name]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = name;
    btn.dataset.cat = id;
    btn.onclick = () => { activeCat = parseInt(id); updateCats(); render(); };
    container.appendChild(btn);
  });
}

function updateCats() {
  document.querySelectorAll('.cat-btn').forEach(b => {
    const id = b.dataset.cat ? parseInt(b.dataset.cat) : null;
    b.classList.toggle('active', id === activeCat);
  });
}

function reset() {
  activeCat = null; maxDur = 30;
  document.getElementById('dur').value = 30;
  document.getElementById('dur-val').textContent = 'toutes';
  updateCats(); render();
}

document.getElementById('dur').addEventListener('input', function() {
  maxDur = parseInt(this.value);
  document.getElementById('dur-val').textContent = formatDur(maxDur);
  render();
});

buildCats();
render();
</script>
